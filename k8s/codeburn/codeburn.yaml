---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codeburn-data
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeburn
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codeburn
  template:
    metadata:
      labels:
        app: codeburn
    spec:
      containers:
        - name: codeburn
          image: codeburn-web:v0.9.8
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8787"
            - name: TZ
              value: "America/Argentina/Buenos_Aires"
            - name: NODE_NO_WARNINGS
              value: "1"
            - name: CODEBURN_REFRESH_MS
              value: "300000"
            - name: CODEBURN_DB
              value: /app/data/codeburn.sqlite
            - name: CODEBURN_DEVICE_HOSTNAME
              value: raspi5
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: openclaw-history
              mountPath: /home/node/.openclaw
              readOnly: true
            - name: claude-history
              mountPath: /home/node/.claude
              readOnly: true
            - name: codex-history
              mountPath: /home/node/.codex
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8787
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8787
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: codeburn-data
        - name: openclaw-history
          nfs:
            server: 10.10.10.20
            path: /home/martin/.openclaw
            readOnly: true
        - name: claude-history
          nfs:
            server: 10.10.10.20
            path: /home/martin/.claude
            readOnly: true
        - name: codex-history
          nfs:
            server: 10.10.10.20
            path: /home/martin/.codex
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: codeburn
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  selector:
    app: codeburn
  ports:
    - name: http
      port: 8787
      targetPort: 8787
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codeburn-home
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`codeburn.home`)
      services:
        - name: codeburn
          port: 8787
  tls: {}

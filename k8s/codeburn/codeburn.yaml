---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codeburn-data
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeburn
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codeburn
  template:
    metadata:
      labels:
        app: codeburn
    spec:
      containers:
        - name: codeburn
          image: codeburn-web:v0.9.15
          imagePullPolicy: Never
          command:
            - codeburn
            - web
            - --no-open
            - --port
            - "8787"
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: CODEBURN_ALLOW_REMOTE
              value: "1"
            - name: CODEBURN_SKIP_BOOTSTRAP
              value: "1"
            - name: HOME
              value: /home/node
            - name: TZ
              value: "America/Argentina/Buenos_Aires"
            - name: NODE_NO_WARNINGS
              value: "1"
          volumeMounts:
            - name: codeburn-config
              mountPath: /home/node/.config/codeburn
            - name: claude-projects
              mountPath: /home/node/.claude/projects
              readOnly: true
            - name: codex-sessions
              mountPath: /home/node/.codex/sessions
              readOnly: true
            - name: gemini-history
              mountPath: /home/node/.gemini
              readOnly: true
            - name: cursor-global-storage
              mountPath: /home/node/.config/Cursor/User/globalStorage
              readOnly: true
            - name: openclaw-agents
              mountPath: /home/node/.openclaw/agents
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/identity
              port: 8787
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 30
          livenessProbe:
            httpGet:
              path: /api/identity
              port: 8787
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: codeburn-config
          persistentVolumeClaim:
            claimName: codeburn-data
        - name: claude-projects
          nfs:
            server: 10.10.10.20
            path: /home/martin/.claude/projects
            readOnly: true
        - name: codex-sessions
          nfs:
            server: 10.10.10.20
            path: /home/martin/.codex/sessions
            readOnly: true
        - name: gemini-history
          nfs:
            server: 10.10.10.20
            path: /home/martin/.gemini
            readOnly: true
        - name: cursor-global-storage
          nfs:
            server: 10.10.10.20
            path: /home/martin/.config/Cursor/User/globalStorage
            readOnly: true
        - name: openclaw-agents
          nfs:
            server: 10.10.10.20
            path: /home/martin/.openclaw/agents
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: codeburn
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  selector:
    app: codeburn
  ports:
    - name: http
      port: 8787
      targetPort: 8787
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codeburn-home
  namespace: infrastructure
  labels:
    app: codeburn
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`codeburn.home`)
      services:
        - name: codeburn
          port: 8787
  tls: {}
